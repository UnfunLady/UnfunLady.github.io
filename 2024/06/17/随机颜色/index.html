>123</span><br><span class="line">124</span><br><span class="line">125</span><br><span class="line">126</span><br><span class="line">127</span><br><span class="line">128</span><br><span class="line">129</span><br><span class="line">130</span><br><span class="line">131</span><br><span class="line">132</span><br><span class="line">133</span><br><span class="line">134</span><br><span class="line">135</span><br><span class="line">136</span><br><span class="line">137</span><br><span class="line">138</span><br><span class="line">139</span><br><span class="line">140</span><br><span class="line">141</span><br><span class="line">142</span><br><span class="line">143</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">// 随机生成颜色</span></span><br><span class="line"><span class="function"><span class="keyword">function</span> <span class="title">createPastelColorGenerator</span>(<span class="params"></span>) </span>&#123;</span><br><span class="line">  <span class="keyword">const</span> generatedColors = <span class="keyword">new</span> <span class="built_in">Set</span>();</span><br><span class="line">  <span class="keyword">const</span> totalColors = <span class="number">16777215</span>; <span class="comment">// 理论上限</span></span><br><span class="line"></span><br><span class="line">  <span class="comment">// 生成淡色系颜色的辅助函数</span></span><br><span class="line">  <span class="function"><span class="keyword">function</span> <span class="title">generatePastelColor</span>(<span class="params"></span>) </span>&#123;</span><br><span class="line">    <span class="comment">// 淡色通常具有较高的亮度和饱和度</span></span><br><span class="line">    <span class="comment">// 这里通过限制 HSL 值来生成淡色</span></span><br><span class="line">    <span class="keyword">const</span> hue = <span class="built_in">Math</span>.floor(<span class="built_in">Math</span>.random() * <span class="number">360</span>); <span class="comment">// 随机色调 (0-359)</span></span><br><span class="line">    <span class="keyword">const</span> saturation = <span class="built_in">Math</span>.floor(<span class="built_in">Math</span>.random() * <span class="number">30</span>) + <span class="number">40</span>; <span class="comment">// 饱和度限制在 40-69%</span></span><br><span class="line">    <span class="keyword">const</span> lightness = <span class="built_in">Math</span>.floor(<span class="built_in">Math</span>.random() * <span class="number">15</span>) + <span class="number">75</span>; <span class="comment">// 亮度限制在 75-89%</span></span><br><span class="line"></span><br><span class="line">    <span class="comment">// 转换 HSL 到 RGB</span></span><br><span class="line">    <span class="keyword">const</span> h = hue / <span class="number">360</span>;</span><br><span class="line">    <span class="keyword">const</span> s = saturation / <span class="number">100</span>;</span><br><span class="line">    <span class="keyword">const</span> l = lightness / <span class="number">100</span>;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">let</span> r, g, b;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">if</span> (s === <span class="number">0</span>) &#123;</span><br><span class="line">      r = g = b = l; <span class="comment">// 灰度</span></span><br><span class="line">    &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">      <span class="keyword">const</span> hue2rgb = <span class="function">(<span class="params">p, q, t</span>) =&gt;</span> &#123;</span><br><span class="line">        <span class="keyword">if</span> (t &lt; <span class="number">0</span>) t += <span class="number">1</span>;</span><br><span class="line">        <span class="keyword">if</span> (t &gt; <span class="number">1</span>) t -= <span class="number">1</span>;</span><br><span class="line">        <span class="keyword">if</span> (t &lt; <span class="number">1</span> / <span class="number">6</span>) <span class="keyword">return</span> p + (q - p) * <span class="number">6</span> * t;</span><br><span class="line">        <span class="keyword">if</span> (t &lt; <span class="number">1</span> / <span class="number">2</span>) <span class="keyword">return</span> q;</span><br><span class="line">        <span class="keyword">if</span> (t &lt; <span class="number">2</span> / <span class="number">3</span>) <span class="keyword">return</span> p + (q - p) * (<span class="number">2</span> / <span class="number">3</span> - t) * <span class="number">6</span>;</span><br><span class="line">        <span class="keyword">return</span> p;</span><br><span class="line">      &#125;;</span><br><span class="line"></span><br><span class="line">      <span class="keyword">const</span> q = l &lt; <span class="number">0.5</span> ? l * (<span class="number">1</span> + s) : l + s - l * s;</span><br><span class="line">      <span class="keyword">const</span> p = <span class="number">2</span> * l - q;</span><br><span class="line">      r = hue2rgb(p, q, h + <span class="number">1</span> / <span class="number">3</span>);</span><br><span class="line">      g = hue2rgb(p, q, h);</span><br><span class="line">      b = hue2rgb(p, q, h - <span class="number">1</span> / <span class="number">3</span>);</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="comment">// 转换 RGB 为十六进制</span></span><br><span class="line">    <span class="keyword">const</span> toHex = <span class="function">(<span class="params">c</span>) =&gt;</span> &#123;</span><br><span class="line">      <span class="keyword">const</span> hex = <span class="built_in">Math</span>.round(c * <span class="number">255</span>).toString(<span class="number">16</span>);</span><br><span class="line">      <span class="keyword">return</span> hex.length === <span class="number">1</span> ? <span class="string">"0"</span> + hex : hex;</span><br><span class="line">    &#125;;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">return</span> <span class="string">`<span class="subst">$&#123;toHex(r)&#125;</span><span class="subst">$&#123;toHex(g)&#125;</span><span class="subst">$&#123;toHex(b)&#125;</span>`</span>;</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="keyword">return</span> <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</span><br><span class="line">    <span class="keyword">if</span> (generatedColors.size &gt;= totalColors) &#123;</span><br><span class="line">      <span class="keyword">throw</span> <span class="keyword">new</span> <span class="built_in">Error</span>(<span class="string">"已生成所有可能的颜色"</span>);</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">let</span> color;</span><br><span class="line">    <span class="keyword">do</span> &#123;</span><br><span class="line">      color = generatePastelColor();</span><br><span class="line">    &#125; <span class="keyword">while</span> (generatedColors.has(color));</span><br><span class="line"></span><br><span class="line">    generatedColors.add(color);</span><br><span class="line">    <span class="keyword">return</span> <span class="string">`#<span class="subst">$&#123;color&#125;</span>`</span>;</span><br><span class="line">  &#125;;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">// 获取比传入颜色更深的颜色</span></span><br><span class="line"><span class="function"><span class="keyword">function</span> <span class="title">getDarkerColor</span>(<span class="params">hexColor, depth = <span class="number">0.2</span></span>) </span>&#123;</span><br><span class="line">  <span class="comment">// 移除可能存在的 # 前缀</span></span><br><span class="line">  hexColor = hexColor.replace(<span class="string">"#"</span>, <span class="string">""</span>);</span><br><span class="line"></span><br><span class="line">  <span class="comment">// 确保颜色是有效的 6 位十六进制</span></span><br><span class="line">  <span class="keyword">if</span> (!<span class="regexp">/^[0-9A-F]&#123;6&#125;$/i</span>.test(hexColor)) &#123;</span><br><span class="line">    <span class="keyword">throw</span> <span class="keyword">new</span> <span class="built_in">Error</span>(<span class="string">"无效的十六进制颜色格式"</span>);</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="comment">// 将十六进制转换为 RGB</span></span><br><span class="line">  <span class="keyword">const</span> r = <span class="built_in">parseInt</span>(hexColor.substring(<span class="number">0</span>, <span class="number">2</span>), <span class="number">16</span>);</span><br><span class="line">  <span class="keyword">const</span> g = <span class="built_in">parseInt</span>(hexColor.substring(<span class="number">2</span>, <span class="number">4</span>), <span class="number">16</span>);</span><br><span class="line">  <span class="keyword">const</span> b = <span class="built_in">parseInt</span>(hexColor.substring(<span class="number">4</span>, <span class="number">6</span>), <span class="number">16</span>);</span><br><span class="line"></span><br><span class="line">  <span class="comment">// 转换 RGB 到 HSL</span></span><br><span class="line">  <span class="keyword">const</span> max = <span class="built_in">Math</span>.max(r, g, b);</span><br><span class="line">  <span class="keyword">const</span> min = <span class="built_in">Math</span>.min(r, g, b);</span><br><span class="line">  <span class="keyword">let</span> h,</span><br><span class="line">    s,</span><br><span class="line">    l = (max + min) / <span class="number">510</span>; <span class="comment">// 510 = 2*255，确保 l 在 0-1 之间</span></span><br><span class="line"></span><br><span class="line">  <span class="keyword">if</span> (max === min) &#123;</span><br><span class="line">    h = s = <span class="number">0</span>; <span class="comment">// 灰度</span></span><br><span class="line">  &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">    <span class="keyword">const</span> d = max - min;</span><br><span class="line">    s = l &gt; <span class="number">0.5</span> ? d / (<span class="number">510</span> - max - min) : d / (max + min);</span><br><span class="line"></span><br><span class="line">    <span class="keyword">switch</span> (max) &#123;</span><br><span class="line">      <span class="keyword">case</span> r:</span><br><span class="line">        h = (g - b) / d + (g &lt; b ? <span class="number">6</span> : <span class="number">0</span>);</span><br><span class="line">        <span class="keyword">break</span>;</span><br><span class="line">      <span class="keyword">case</span> g:</span><br><span class="line">        h = (b - r) / d + <span class="number">2</span>;</span><br><span class="line">        <span class="keyword">break</span>;</span><br><span class="line">      <span class="keyword">case</span> b:</span><br><span class="line">        h = (r - g) / d + <span class="number">4</span>;</span><br><span class="line">        <span class="keyword">break</span>;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    h /= <span class="number">6</span>;</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="comment">// 调整亮度（降低亮度使颜色更深）</span></span><br><span class="line">  <span class="keyword">const</span> newLightness = <span class="built_in">Math</span>.max(<span class="number">0</span>, l - depth);</span><br><span class="line"></span><br><span class="line">  <span class="comment">// 转换回 RGB</span></span><br><span class="line">  <span class="keyword">let</span> rNew, gNew, bNew;</span><br><span class="line"></span><br><span class="line">  <span class="keyword">if</span> (s === <span class="number">0</span>) &#123;</span><br><span class="line">    rNew = gNew = bNew = <span class="built_in">Math</span>.round(newLightness * <span class="number">255</span>); <span class="comment">// 灰度</span></span><br><span class="line">  &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">    <span class="keyword">const</span> hue2rgb = <span class="function">(<span class="params">p, q, t</span>) =&gt;</span> &#123;</span><br><span class="line">      <span class="keyword">if</span> (t &lt; <span class="number">0</span>) t += <span class="number">1</span>;</span><br><span class="line">      <span class="keyword">if</span> (t &gt; <span class="number">1</span>) t -= <span class="number">1</span>;</span><br><span class="line">      <span class="keyword">if</span> (t &lt; <span class="number">1</span> / <span class="number">6</span>) <span class="keyword">return</span> p + (q - p) * <span class="number">6</span> * t;</span><br><span class="line">      <span class="keyword">if</span> (t &lt; <span class="number">1</span> / <span class="number">2</span>) <span class="keyword">return</span> q;</span><br><span class="line">      <span class="keyword">if</span> (t &lt; <span class="number">2</span> / <span class="number">3</span>) <span class="keyword">return</span> p + (q - p) * (<span class="number">2</span> / <span class="number">3</span> - t) * <span class="number">6</span>;</span><br><span class="line">      <span class="keyword">return</span> p;</span><br><span class="line">    &#125;;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">const</span> q =</span><br><span class="line">      newLightness &lt; <span class="number">0.5</span></span><br><span class="line">        ? newLightness * (<span class="number">1</span> + s)</span><br><span class="line">        : newLightness + s - newLightness * s;</span><br><span class="line">    <span class="keyword">const</span> p = <span class="number">2</span> * newLightness - q;</span><br><span class="line"></span><br><span class="line">    rNew = <span class="built_in">Math</span>.round(hue2rgb(p, q, h + <span class="number">1</span> / <span class="number">3</span>) * <span class="number">255</span>);</span><br><span class="line">    gNew = <span class="built_in">Math</span>.round(hue2rgb(p, q, h) * <span class="number">255</span>);</span><br><span class="line">    bNew = <span class="built_in">Math</span>.round(hue2rgb(p, q, h - <span class="number">1</span> / <span class="number">3</span>) * <span class="number">255</span>);</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="comment">// 转换回十六进制（修复：确保每个分量都是2位）</span></span><br><span class="line">  <span class="keyword">const</span> toHex = <span class="function">(<span class="params">c</span>) =&gt;</span> &#123;</span><br><span class="line">    <span class="keyword">const</span> hex = <span class="built_in">Math</span>.min(<span class="number">255</span>, <span class="built_in">Math</span>.max(<span class="number">0</span>, c)).toString(<span class="number">16</span>);</span><br><span class="line">    <span class="keyword">return</span> hex.length === <span class="number">1</span> ? <span class="string">"0"</span> + hex : hex;</span><br><span class="line">  &#125;;</span><br><span class="line"></span><br><span class="line">  <span class="keyword">return</span> <span class="string">`#<span class="subst">$&#123;toHex(rNew)&#125;</span><span class="subst">$&#123;toHex(gNew)&#125;</span><span class="subst">$&#123;toHex(bNew)&#125;</span>`</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
