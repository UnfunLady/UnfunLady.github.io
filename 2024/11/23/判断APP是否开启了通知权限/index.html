id"</span>) &#123;</span><br><span class="line">    <span class="keyword">var</span> main = plus.android.runtimeMainActivity();</span><br><span class="line">    <span class="keyword">var</span> NotificationManagerCompat = plus.android.importClass(</span><br><span class="line">      <span class="string">"android.support.v4.app.NotificationManagerCompat"</span></span><br><span class="line">    );</span><br><span class="line">    <span class="keyword">if</span> (NotificationManagerCompat == <span class="literal">null</span>) &#123;</span><br><span class="line">      NotificationManagerCompat = plus.android.importClass(</span><br><span class="line">        <span class="string">"androidx.core.app.NotificationManagerCompat"</span></span><br><span class="line">      );</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">var</span> areNotificationsEnabled =</span><br><span class="line">      NotificationManagerCompat.from(main).areNotificationsEnabled();</span><br><span class="line">    <span class="keyword">return</span> areNotificationsEnabled;</span><br><span class="line">  &#125; <span class="keyword">else</span> <span class="keyword">if</span> (plus.os.name == <span class="string">"iOS"</span>) &#123;</span><br><span class="line">    <span class="keyword">var</span> isIosOn = <span class="literal">undefined</span>;</span><br><span class="line">    <span class="keyword">var</span> types = <span class="number">0</span>;</span><br><span class="line">    <span class="keyword">var</span> app = plus.ios.invoke(<span class="string">"UIApplication"</span>, <span class="string">"sharedApplication"</span>);</span><br><span class="line">    <span class="keyword">var</span> settings = plus.ios.invoke(app, <span class="string">"currentUserNotificationSettings"</span>);</span><br><span class="line">    <span class="keyword">if</span> (settings) &#123;</span><br><span class="line">      types = settings.plusGetAttribute(<span class="string">  = main.getApplicationInfo().plusGetAttribute(<span class="string">"uid"</span>);</span><br><span class="line">    <span class="keyword">var</span> Intent = plus.android.importClass(<span class="string">"android.content.Intent"</span>);</span><br><span class="line">    <span class="keyword">var</span> Build = plus.android.importClass(<span class="string">"android.os.Build"</span>);</span><br><span class="line">    <span class="comment">//android 8.0引导</span></span><br><span class="line">    <span class="keyword">if</span> (Build.VERSION.SDK_INT &gt;= <span class="number">26</span>) &#123;</span><br><span class="line">      <span class="keyword">var</span> intent = <span class="keyword">new</span> Intent(<span class="string">"android.settings.APP_NOTIFICATION_SETTINGS"</span>);</span><br><span class="line">      intent.putExtra(<span class="string">"android.provider.extra.APP_PACKAGE"</span>, pkName);</span><br><span class="line">    &#125; <span class="keyword">else</span> <span class="keyword">if</span> (Build.VERSION.SDK_INT &gt;= <span class="number">21</span>) &#123;</span><br><span class="line">      <span class="comment">//android 5.0-7.0</span></span><br><span class="line">      <span class="keyword">var</span> intent = <span class="keyword">new</span> Intent(<span class="string">"android.settings.APP_NOTIFICATION_SETTINGS"</span>);</span><br><span class="line">      intent.putExtra(<span class="string">"app_package"</span>, pkName);</span><br><span class="line">      intent.putExtra(<span class="string">"app_uid"</span>, uid);</span><br><span class="line">    &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">      <span class="comment">//(&lt;21)其他--跳转到该应用管理的详情页</span></span><br><span class="line">      intent.setAction(Settings.ACTION_APPLICATION_DETAILS_SETTINGS);</span><br><span class="line">      <span class="keyword">var</span> uri = Uri.fromParts(<span class="string">"package"</span>, mainActivity.getPackageName(), <span clas roidSetting();</span><br><span class="line">        &#125; <span class="keyword">else</span> <span class="keyword">if</span> (plus.os.name == <span class="string">"iOS"</span>) &#123;</span><br><span class="line">          openIOSSetting();</span><br><span class="line">        &#125;</span><br><span class="line">      &#125;</span><br><span class="line">    &#125;,</span><br><span class="line">  &#125;);</span><br><span class="line">  <span class="comment">// #endif</span></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="keyword">export</span> <span class="keyword">default</span> &#123;</span><br><span class="line">  isOn,</span><br><span class="line">  switchPushPermissions,</span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"><span class="comment">// #ifdef APP</span></span><br><span class="line"><span class="keyword">try</span> &#123;</span><br><span class="line">  <span class="keyword">const</span> flag = notice.isOn();</span><br><span class="line">  <span class="keyword">if</span> (!flag) &#123;</span><br><span class="line">    notice.switchPushPermissions();</span><br><span class="line">  &#125;</span><br><span class="line">&#125; <span class="keyword">catch</span> (e) &#123;</span><br><span class="line">  <span class="built_in">console</span>.log(e, notice);</span><br><span class="line">  <span class="comment">//TODO handle the exception</span></span><br><span class="line">&#125;</span><br><span class="line"><span class="comment">// #endif</span></span><br></pre></td></tr></table></figure>
